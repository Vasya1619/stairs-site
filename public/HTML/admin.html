<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-panel">
        <div class="container">
            <div class="admin__title" class="h3">Admin panel</div>
            <div class="admin-panel__inner">
               <select id="gallerySelect"></select>
                <div class="admin-panel__inputs">
                    <div class="inputs__image">
                        <input type="text" id="img1" placeholder="ссылка на 1 фото">
                        <input type="text" id="img2" placeholder="ссылка на 2 фото">
                        <input type="text" id="img3" placeholder="ссылка на 3 фото">
                    </div>
                    <div class="inputs__description">
                        <input id="price" placeholder="Цена">
                        <input id="materials" placeholder="Материалы">
                        <input id="duration" placeholder="Сроки">  
                    </div>
                </div>
                <button id="save">Сохранить</button> 
            </div>
        </div>
    </div>

    <script src="../JS/fetch.js" defer></script>
</body>
</html>
